services:
  backend:
    build: ./backend
    env_file: .env
    environment:
      - CORS_ORIGINS=http://localhost:3000,http://localhost:5173,http://localhost
      - LOG_LEVEL=INFO
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload

  frontend:
    build: ./frontend
    ports:
      - "3000:80"
    depends_on:
      - backend
